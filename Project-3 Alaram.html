<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Alarm Clock</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #111;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .clock-container {
      text-align: center;
      background: #222;
      padding: 30px 50px;
      border-radius: 20px;
      box-shadow: 0 0 20px #00ffcc;
    }

    #time {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .alarm-setter input {
      padding: 10px;
      font-size: 1rem;
      margin-right: 10px;
    }

    .alarm-setter button {
      padding: 10px 15px;
      font-size: 1rem;
      margin: 5px;
      border: none;
      background-color: #00ffcc;
      color: #000;
      cursor: pointer;
      border-radius: 10px;
      transition: 0.3s;
    }

    .alarm-setter button:hover {
      background-color: #00ccaa;
    }

    #alarm-status {
      margin-top: 15px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="clock-container">
    <h1 id="time">00:00:00</h1>
    <div class="alarm-setter">
      <input type="time" id="alarm-time" />
      <button onclick="setAlarm()">Set Alarm</button>
      <button onclick="clearAlarm()">Clear Alarm</button>
    </div>
    <p id="alarm-status">No alarm set</p>
  </div>

  <audio id="alarm-audio" src="C:\Users\pc\Downloads\mixkit-classic-alarm-995.wav" preload="auto"></audio>

  <script>
    let alarmTime = null;

    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('en-GB', { hour12: false });
      document.getElementById("time").textContent = timeString;

      if (alarmTime === timeString) {
        document.getElementById("alarm-audio").play();
        alert("Alarm ringing!");
        clearAlarm();
      }
    }

    setInterval(updateClock, 1000);

    function setAlarm() {
      const input = document.getElementById("alarm-time").value;
      if (input) {
        alarmTime = input + ":00";
        document.getElementById("alarm-status").textContent = "Alarm set for " + alarmTime;
      }
    }

    function clearAlarm() {
      alarmTime = null;
      document.getElementById("alarm-status").textContent = "No alarm set";
    }
  </script>
</body>
</html>
